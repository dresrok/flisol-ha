<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lava Lamp Experience — V2</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="scene">
    <!-- Classic lava lamp chrome hardware -->
    <div class="lamp" id="lamp">
      <div class="lamp-top"></div>
      <div class="lamp-vessel-wrap">
        <canvas id="lampCanvas"></canvas>
        <div class="lamp-glass"></div>
      </div>
      <div class="lamp-base"></div>
    </div>

    <!-- Controls Panel -->
    <div class="controls" id="controls">
      <h2>Lava Controls</h2>

      <div class="control-group">
        <label for="brightness">Brightness / Glow</label>
        <input type="range" id="brightness" min="0.3" max="2.5" step="0.05" value="1.0" />
      </div>

      <div class="control-group">
        <label for="speed">Heat / Convection Speed</label>
        <input type="range" id="speed" min="0.2" max="3.0" step="0.1" value="1.0" />
        <span class="hint">Higher = more energetic thermal cycling</span>
      </div>

      <div class="control-group">
        <label for="blobCount">Blob Count</label>
        <input type="range" id="blobCount" min="3" max="25" step="1" value="10" />
      </div>

      <div class="control-group">
        <label for="palette">Color Palette</label>
        <select id="palette">
          <option value="sunset">Sunset</option>
          <option value="ocean">Ocean</option>
          <option value="forest">Forest</option>
          <option value="berry">Berry</option>
          <option value="gold">Gold</option>
          <option value="custom">Custom…</option>
        </select>
      </div>

      <div class="control-group color-picker-wrap" id="customColorWrap" style="display:none">
        <label for="customColorA">Primary Color</label>
        <input type="color" id="customColorA" value="#ff6633" />
        <label for="customColorB">Secondary Color</label>
        <input type="color" id="customColorB" value="#ffcc00" />
      </div>

      <button id="resetBtn" class="reset-btn" type="button">Restore Defaults</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
